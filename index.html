<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Deník matky manažerky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 20px; background: #f5efe7;">

  <h1>Deník matky manažerky</h1>

  <input id="taskInput" placeholder="Zadej úkol" />
  <button onclick="addTask()">Přidat</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

    function render() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";
      tasks.forEach((t, i) => {
        const li = document.createElement("li");
        li.innerHTML = t + " <button onclick='removeTask(" + i + ")'>❌</button>";
        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      if (!input.value.trim()) return;
      tasks.push(input.value);
      localStorage.setItem("tasks", JSON.stringify(tasks));
      input.value = "";
      render();
    }

    function removeTask(i) {
      tasks.splice(i, 1);
      localStorage.setItem("tasks", JSON.stringify(tasks));
      render();
    }

    render();
  </script>

</body>
</html>
